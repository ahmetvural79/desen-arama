name: build

# Linux'ta testleri çalıştırır; Windows'ta PyInstaller ile .exe ve Inno Setup
# ile kurulum sihirbazını derleyip artifact olarak yükler. Etiket (v*) push
# edilince bunları bir GitHub Release'e ekler.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # etiket push'unda GitHub Release oluşturmak için gerekli

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Testleri çalıştır (başsız Qt)
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -m pytest tests/ -q

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Başsız duman testi
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -q

      - name: PyInstaller ile derle (onedir)
        run: pyinstaller --noconfirm --clean packaging/desenarama.spec

      - name: Taşınabilir ZIP oluştur
        run: Compress-Archive -Path dist/DesenArama/* -DestinationPath dist/DesenArama-portable-win64.zip
        shell: pwsh

      - name: Inno Setup kur
        run: choco install innosetup --no-progress -y

      - name: Kurulum sihirbazını derle
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" packaging\installer.iss'
        shell: pwsh

      - name: Artifact — taşınabilir ZIP
        uses: actions/upload-artifact@v4
        with:
          name: DesenArama-portable-win64
          path: dist/DesenArama-portable-win64.zip

      - name: Artifact — kurulum sihirbazı
        uses: actions/upload-artifact@v4
        with:
          name: DesenArama-setup
          path: dist_installer/*.exe

      - name: Release'e ekle (etiket push'unda)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DesenArama-portable-win64.zip
            dist_installer/*.exe
